esphome:
  name: chime-clone
  friendly_name: "UP Chime Clone"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
  # For local development:
  - source:
      type: local
      path: external_components
  # Or pull from GitHub:
  # - source:
  #     type: git
  #     url: https://github.com/qoole/esphome-unifi-chime
  #     ref: master

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

unifi_chime:
  # Trigger when the controller sends a ring command (e.g. doorbell press).
  # Variables: track (uint8_t), volume (uint8_t, 0-100).
  on_ring:
    - logger.log:
        format: "Doorbell rang! Track: %d, Volume: %d"
        args: [track, volume]
    # - homeassistant.event:
    #     event: esphome.doorbell_ring
    #     data:
    #       track: !lambda "return track;"
    #       volume: !lambda "return volume;"
    # - rtttl.play: "ring:d=4,o=5,b=200:e6,c6"
    # - switch.toggle: my_relay
  # Trigger when the controller sends a buzzer/alarm command.
  # This fires for security alarm events routed to the chime,
  # distinct from doorbell rings (which use on_ring / playSpeaker).
  # on_buzzer:
  #   - logger.log: "Buzzer alarm triggered!"

# Binary sensors for adoption and controller connection state.
# binary_sensor:
#   - platform: unifi_chime
#     adopted:
#       name: "Chime Adopted"
#     connected:
#       name: "Chime Connected"

api:

ota:
  platform: esphome