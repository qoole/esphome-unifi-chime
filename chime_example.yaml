esphome:
  name: chime-clone
  friendly_name: "UP Chime Clone"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: external_components

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

unifi_chime:
  # Trigger when the controller sends a ring command (e.g. doorbell press).
  # The variable 'x' is the track number (uint8_t).
  on_ring:
    - logger.log:
        format: "Doorbell rang! Track: %d"
        args: [x]
